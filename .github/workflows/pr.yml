name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec oxlint --format github

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    uses: ./.github/workflows/e2e.yml
    # Why no `secrets: inherit`: the AI suite is not invoked on PRs. Every
    # PR runs the default Playwright suite only; the Stably step is
    # release-only (see .github/workflows/release.yml). Avoiding the
    # secret mount here keeps the PR pipeline auditable — a reader can
    # see at a glance that no PR run, fork or otherwise, can reach the
    # Stably API key.
