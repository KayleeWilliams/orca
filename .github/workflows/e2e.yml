name: E2E

on:
  workflow_call:
    inputs:
      ref:
        description: Ref to check out (defaults to the calling workflow's ref)
        required: false
        type: string
    secrets:
      # Why: secrets flow through `workflow_call` explicitly; we cannot
      # declare them as inputs. The Stably keys are optional — when missing,
      # the AI suite simply does not run.
      STABLY_API_KEY:
        required: false
      STABLY_PROJECT_ID:
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Why: hoist the key to the job level so the conditional on the AI step
    # can read it. Step-level `env` is set after `if:` is evaluated, which
    # is why the check has to live here. The value is empty (and the step
    # skips) whenever secrets aren't available — e.g. fork PR runs.
    env:
      STABLY_API_KEY: ${{ secrets.STABLY_API_KEY }}
      STABLY_PROJECT_ID: ${{ secrets.STABLY_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      # Why: electron-vite's globalSetup invokes a full app build, which
      # compiles native modules via node-gyp. Mirrors the install step in
      # pr.yml's verify job so E2E doesn't hit missing-toolchain errors.
      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      # Why: Electron on Linux needs an X display even when the app
      # suppresses mainWindow.show() via ORCA_E2E_HEADLESS. xvfb provides a
      # virtual framebuffer so Chromium can initialize without a real display.
      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run E2E tests
        run: xvfb-run --auto-servernum pnpm run test:e2e

      # Why: the AI suite is gated on STABLY_API_KEY and only runs on
      # release tags — pr.yml intentionally does NOT inherit secrets, so
      # no PR (in-repo or fork) can reach the Stably API. The key arrives
      # via `secrets: inherit` from release.yml on trusted release refs.
      # `continue-on-error` keeps it non-blocking, matching the project-
      # level guidance that Stably coverage is additive signal rather
      # than a merge gate.
      - name: Run Stably AI E2E tests
        id: stably
        if: ${{ env.STABLY_API_KEY != '' }}
        env:
          # Why: SKIP_BUILD reuses the build artifact from the previous step
          # instead of rebuilding Electron a second time — cuts ~2min off CI.
          SKIP_BUILD: '1'
        continue-on-error: true
        run: xvfb-run --auto-servernum pnpm run test:e2e:stably

      # Why: Playwright retains traces/screenshots only on failure. Uploading
      # them as an artifact makes post-mortem debugging on CI possible without
      # re-running locally.
      - name: Upload Playwright traces
        # Why: `continue-on-error: true` on the Stably step rewrites its outcome
        # to success, so `failure()` alone won't catch Stably failures. Check
        # `steps.stably.outcome` explicitly to preserve trace uploads for the
        # AI suite's retain-on-failure debugging workflow.
        if: ${{ failure() || steps.stably.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
